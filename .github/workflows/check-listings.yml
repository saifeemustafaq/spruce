name: Check BMR Listings

on:
  schedule:
    - cron: '17 * * * *'   # 17 minutes past the hour (off-peak)
    - cron: '47 * * * *'   # 47 minutes past the hour (off-peak)
  workflow_dispatch:        # manual trigger for testing

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run listing check
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          # Set this in: Settings → Variables → Actions → TRACKING_MODE
          # Values: "bmr" (default) or "changes"
          TRACKING_MODE: ${{ vars.TRACKING_MODE || 'bmr' }}
        run: python scraper/check.py

      - name: Commit and Push History
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Add the generated per-property tracking files
          git add scraper/data/ || true

          # Commit and push only if there are staged changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update apartment history log" && git pull --rebase origin main && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
