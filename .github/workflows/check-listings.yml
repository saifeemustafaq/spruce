name: Check BMR Listings

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:        # manual trigger for testing

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore page snapshot (used in changes mode)
        uses: actions/cache/restore@v4
        with:
          path: scraper/snapshot.txt
          # Unique save key per run; restore-keys picks up the latest saved snapshot
          key: page-snapshot-${{ github.run_id }}
          restore-keys: |
            page-snapshot-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r scraper/requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run listing check
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          # Set this in: Settings → Variables → Actions → TRACKING_MODE
          # Values: "bmr" (default) or "changes"
          TRACKING_MODE: ${{ vars.TRACKING_MODE || 'bmr' }}
        run: python scraper/check.py

      - name: Save updated snapshot
        uses: actions/cache/save@v4
        with:
          path: scraper/snapshot.txt
          key: page-snapshot-${{ github.run_id }}
