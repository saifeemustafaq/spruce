name: Check BMR Listings

on:
  schedule:
    - cron: '0 * * * *'    # every hour — silent unless BMR found
    - cron: '0 17 * * *'   # daily at 9am PT (17:00 UTC) — always emails status
  workflow_dispatch:
    inputs:
      heartbeat:
        description: 'Send heartbeat email regardless of results?'
        required: false
        default: 'false'

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r scraper/requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run listing check
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SEND_HEARTBEAT: >-
            ${{
              github.event_name == 'workflow_dispatch' && inputs.heartbeat == 'true' ||
              github.event.schedule == '0 17 * * *'
            }}
        run: python scraper/check.py
